<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>SPJIMR Timetable</title>
  </head>
  <body>
    <header class="header">
      <h1 class="title">Timetable</h1>
      <div class="actions">
        <button id="sync" class="action-btn" title="Sync this week to Google Calendar">
          <svg class="google-icon" aria-hidden="true" viewBox="0 0 48 48" width="14" height="14">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Calendar Sync
        </button>
        <button id="export" class="action-btn" title="Export this week (.ics)">
          Export
        </button>
        <button id="refresh" class="action-btn" title="Refresh">
          <span class="refresh-icon" aria-hidden="true">&#x21bb;</span>
        </button>
      </div>
    </header>
    <nav class="weeknav">
      <button id="prevWeek" class="nav-btn" title="Previous week">&#x2039;</button>
      <div id="weekLabel" class="week-label"></div>
      <button id="nextWeek" class="nav-btn" title="Next week">&#x203a;</button>
    </nav>
    <div id="updated" class="updated"></div>
    <div id="syncStatus" class="sync-status"></div>
    <main id="content" class="content"></main>
    <script src="popup.js"></script>
  </body>
</html>
